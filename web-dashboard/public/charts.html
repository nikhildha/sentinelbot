<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL — Charts</title>
    <meta name="description" content="SENTINEL — Advanced Trading Charts">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script
        src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>

<body>
    <!-- ═══ Header ═══ -->
    <header class="header">
        <div class="logo">
            <div>
                <div class="logo-text">SENTINEL</div>
                <div class="logo-subtitle">Charts</div>
            </div>
        </div>
        <nav class="header-nav">
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/tradebook" class="nav-link">Tradebook</a>
            <a href="/charts" class="nav-link active">Charts</a>
            <a href="/settings" class="nav-link">Settings</a>
        </nav>
        <div class="header-right">
            <span class="timestamp" id="lastUpdate">Connecting...</span>
            <span class="status-dot" id="statusDot"></span>
        </div>
    </header>

    <!-- ═══ Main Layout ═══ -->
    <div class="charts-layout">
        <!-- Coin Sidebar -->
        <div class="coin-sidebar">
            <div class="sidebar-title">Active Positions</div>
            <div class="coin-list" id="coinList">
                <div class="no-coins">Loading positions...</div>
            </div>
        </div>

        <!-- Chart Panel -->
        <div class="chart-panel">
            <div class="chart-toolbar" id="chartToolbar" style="display:none;">
                <div>
                    <span class="chart-symbol" id="chartSymbol">BTCUSDT</span>
                </div>
                <div class="chart-info">
                    <span class="price" id="chartPrice">—</span>
                    <span class="change" id="chartChange">—</span>
                </div>
                <div class="timeframe-bar" id="timeframeBar">
                    <button class="tf-btn" data-tf="5m">5m</button>
                    <button class="tf-btn" data-tf="15m">15m</button>
                    <button class="tf-btn active" data-tf="1h">1h</button>
                    <button class="tf-btn" data-tf="4h">4h</button>
                    <button class="tf-btn" data-tf="1d">1d</button>
                </div>
            </div>
            <!-- Regime Banner (shown when a coin is selected) -->
            <div class="regime-banner" id="regimeBanner" style="display:none;">
                <span class="regime-dot" id="regimeDot"></span>
                <span class="regime-banner-text" id="regimeBannerText">— REGIME</span>
                <span class="regime-banner-conf" id="regimeBannerConf"></span>
            </div>
            <div class="chart-container" id="chartContainer">
                <div class="no-selection" id="noSelection">Select a coin from the sidebar to view its chart</div>
            </div>
        </div>
    </div>

    <script src="/mode-toggle.js"></script>
    <script src="/charts-app.js"></script>
</body>

</html>
